<filter height="140%" id="route-glow" width="140%" x="-20%" y="-20%">
<fegaussianblur result="blur" stddeviation="4"></fegaussianblur>

<path d="M 200 800 L 200 600 L 280 520 L 280 400 L 120 240 L 120 0" fill="none" stroke="#10b981" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg></div>

<!-- Next Signal Card -->

<div class="bg-surface-container/90 glass-panel rounded-xl border border-outline-variant/30 px-6 py-4 flex items-center justify-between gap-xl w-full max-w-2xl pointer-events-auto shadow-xl">

<h2 class="text-error font-headline-md text-headline-md leading-none">RED LIGHT</h2>
</div>
</div>

<span class="text-on-surface-variant font-label-sm">at Broadway St.</span>
</div>
</div>
</div>
<!-- Lane Guidance & Next Turn -->
<div class="w-full flex justify-center">
<div class="bg-surface-container/80 glass-panel rounded-lg px-gutter py-3 flex items-center gap-lg border border-outline-variant/20 shadow-lg pointer-events-auto">

<div class="flex items-center gap-1.5 mt-1">

<div class="absolute left-0 top-0 h-full bg-primary w-[68%] transition-all duration-1000 ease-out shadow-[0_0_10px_rgba(78,222,163,0.5)]"></div>
</div>

<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Simulated Countdown
            let seconds = 24;
            const countdownEl = document.getElementById('countdown');
            const interval = setInterval(() => {
                seconds--;
                if (seconds >= 0) {
                    countdownEl.innerText = `${seconds}s`;
                    if (seconds <= 5) {
                        countdownEl.classList.add('animate-pulse-soft');
                    }
                } else {
                    clearInterval(interval);
                }
            }, 1000);

            // Simulated Speed Variation
            const speedEl = document.getElementById('current-speed');
            setInterval(() => {
                let current = parseInt(speedEl.innerText);
                let change = Math.floor(Math.random() * 3) - 1; // -1, 0, or 1
                let next = current + change;
                if (next > 55 && next < 62) {
                    speedEl.innerText = next;
                    if (next > 60) {
                        speedEl.classList.remove('text-on-surface');
                        speedEl.classList.add('text-error');
                    } else {
                        speedEl.classList.remove('text-error');
                        speedEl.classList.add('text-on-surface');
                    }
                }
            }, 2000);
        });
    </script>
