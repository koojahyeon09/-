<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 신호등 지도 - Leaflet OpenStreetMap</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Leaflet.js (OpenStreetMap) CSS 및 JS - API 키 불필요 -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center p-4 md:p-8">

  <header class="w-full max-w-4xl text-center mb-6">
    <div class="inline-flex items-center gap-2 mb-2">
      <span class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></span>
      <span class="w-3 h-3 rounded-full bg-yellow-500 animate-pulse"></span>
      <span class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></span>
    </div>
    <h1 class="text-3xl font-bold text-white">🚦 AI 신호등 지도</h1>
    <p class="text-slate-400 text-sm mt-1">OpenStreetMap 기반 AI 경로 탐색 서비스</p>
  </header>

  <main class="w-full max-w-4xl grid grid-cols-1 lg:grid-cols-12 gap-6">
    
    <!-- 입력 폼 및 결과 섹션 -->
    <section class="lg:col-span-5 bg-slate-800 rounded-2xl p-6 shadow-xl border border-slate-700 h-fit">
      <form id="routeForm" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">출발지</label>
          <input type="text" id="startInput" placeholder="예: 강남역 10번 출구" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-green-500" />
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">목적지</label>
          <input type="text" id="destInput" placeholder="예: 역삼역 3번 출구" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-green-500" />
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">이동 수단</label>
          <select id="modeSelect" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-green-500">
            <option value="보행자">보행자 (도보)</option>
            <option value="자전거 / 킥보드">자전거 / 킥보드</option>
            <option value="운전자 (차량)">운전자 (차량)</option>
          </select>
        </div>

        <button type="submit" id="submitBtn" class="w-full bg-green-600 hover:bg-green-500 text-white font-semibold py-3 rounded-lg transition">
          경로 탐색 및 지도 표시
        </button>
      </form>

      <div id="loading" class="hidden text-center py-6">
        <div class="inline-block w-6 h-6 border-2 border-green-500 border-t-transparent rounded-full animate-spin mb-2"></div>
        <p class="text-slate-300 text-xs">경로 탐색 및 지도 좌표 생성 중...</p>
      </div>

      <div id="errorBox" class="hidden mt-4 p-3 bg-red-900/50 border border-red-700 rounded-lg text-red-200 text-xs"></div>

      <div id="resultBox" class="hidden mt-4 pt-4 border-t border-slate-700 space-y-3">
        <div class="bg-slate-900 p-3 rounded-lg border border-slate-700">
          <h2 id="resultSummary" class="text-sm font-semibold text-white"></h2>
          <div class="flex gap-2 mt-2 text-xs text-slate-300">
            <span>⏱️ <strong id="resultTime" class="text-white"></strong></span>
            <span>🚦 <strong id="resultLights" class="text-white"></strong></span>
          </div>
        </div>

        <div class="text-xs text-slate-300">
          <h3 class="font-semibold mb-1 text-slate-400">상세 안내</h3>
          <ol id="resultSteps" class="space-y-1 list-decimal list-inside bg-slate-900/50 p-3 rounded-lg border border-slate-800">
          </ol>
        </div>

        <div class="p-3 bg-yellow-500/10 border border-yellow-500/30 rounded-lg text-yellow-200 text-xs">
          <strong>💡 AI 팁:</strong> <span id="resultTip"></span>
        </div>
      </div>
    </section>

    <!-- 지도 섹션 -->
    <section class="lg:col-span-7 bg-slate-800 rounded-2xl p-2 shadow-xl border border-slate-700 min-h-[400px] flex flex-col">
      <div id="map" class="w-full h-full min-h-[400px] rounded-xl z-0"></div>
    </section>

  </main>

  <script>
    let map, startMarker, destMarker, routeLine;

    // OpenStreetMap 초기화
    window.onload = () => {
      map = L.map('map').setView([37.498095, 127.027610], 14);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
      }).addTo(map);
    };

    const form = document.getElementById('routeForm');
    const loading = document.getElementById('loading');
    const resultBox = document.getElementById('resultBox');
    const errorBox = document.getElementById('errorBox');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const start = document.getElementById('startInput').value;
      const destination = document.getElementById('destInput').value;
      const mode = document.getElementById('modeSelect').value;

      resultBox.classList.add('hidden');
      errorBox.classList.add('hidden');
      loading.classList.remove('hidden');
      submitBtn.disabled = true;

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ start, destination, mode })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || '경로를 불러오지 못했습니다.');

        document.getElementById('resultSummary').innerText = data.summary;
        document.getElementById('resultTime').innerText = data.estimatedTime;
        document.getElementById('resultLights').innerText = data.trafficLightCount;
        document.getElementById('resultTip').innerText = data.aiTip;

        const stepsOl = document.getElementById('resultSteps');
        stepsOl.innerHTML = '';
        data.steps.forEach(stepText => {
          const li = document.createElement('li');
          li.innerText = stepText;
          stepsOl.appendChild(li);
        });

        // 지도 상 마커 및 경로 그리기
        drawMapRoute(data.startCoords, data.destCoords);

        resultBox.classList.remove('hidden');
      } catch (err) {
        errorBox.innerText = err.message;
        errorBox.classList.remove('hidden');
      } finally {
        loading.classList.add('hidden');
        submitBtn.disabled = false;
      }
    });

    function drawMapRoute(startCoords, destCoords) {
      if (startMarker) map.removeLayer(startMarker);
      if (destMarker) map.removeLayer(destMarker);
      if (routeLine) map.removeLayer(routeLine);

      const startPoint = [startCoords.lat, startCoords.lng];
      const destPoint = [destCoords.lat, destCoords.lng];

      startMarker = L.marker(startPoint).addTo(map).bindPopup("<b>출발지</b>").openPopup();
      destMarker = L.marker(destPoint).addTo(map).bindPopup("<b>목적지</b>");

      routeLine = L.polyline([startPoint, destPoint], { color: '#22c55e', weight: 5 }).addTo(map);

      map.fitBounds(L.latLngBounds([startPoint, destPoint]), { padding: [50, 50] });
    }
  </script>
</body>
</html>
