<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic Light Map</title>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    #search-bar {
      position: absolute; top: 10px; left: 50px; z-index: 1000;
      background: white; padding: 10px; border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    #map { width: 100vw; height: 100vh; }
    input, button { padding: 8px; margin-right: 5px; }
  </style>
</head>
<body>

  <div id="search-bar">
    <input type="text" id="startInput" placeholder="출발지 (예: 서현역)">
    <input type="text" id="destInput" placeholder="목적지 (예: 분당중앙공원)">
    <button onclick="findRoute()">경로 검색</button>
  </div>

  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // 1. Leaflet 지도 초기화 (기본 서울/경기 중심)
    const map = L.map('map').setView([37.3827, 127.1189], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let currentRouteLayer = null;

    async function findRoute() {
      const start = document.getElementById('startInput').value;
      const destination = document.getElementById('destInput').value;

      if (!start || !destination) {
        alert("출발지와 목적지를 모두 입력해 주세요.");
        return;
      }

      try {
        // 백엔드 API 호출 (Gemini 좌표 + 신호등 데이터)
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ start, destination })
        });

        const data = await res.json();
        if (!data.success) throw new Error("좌표 검색 실패");

        const { start: startCoord, dest: destCoord } = data.coords;

        // 마커 표시
        L.marker([startCoord.lat, startCoord.lng]).addTo(map).bindPopup("출발지: " + start).openPopup();
        L.marker([destCoord.lat, destCoord.lng]).addTo(map).bindPopup("목적지: " + destination);

        // OSRM API 호출 (인증키 필요 없는 보행자/도로 경로 계산)
        const osrmUrl = `https://router.project-osrm.org/route/v1/foot/${startCoord.lng},${startCoord.lat};${destCoord.lng},${destCoord.lat}?overview=full&geometries=geojson`;
        const routeRes = await fetch(osrmUrl);
        const routeData = await routeRes.json();

        if (routeData.routes && routeData.routes.length > 0) {
          if (currentRouteLayer) map.removeLayer(currentRouteLayer);

          // OSRM 경로 지도에 그리기
          currentRouteLayer = L.geoJSON(routeData.routes[0].geometry, {
            style: { color: 'blue', weight: 5, opacity: 0.7 }
          }).addTo(map);

          // 경로 영역에 맞게 지도 화면 맞춤
          map.fitBounds(currentRouteLayer.getBounds());
        }

      } catch (err) {
        console.error(err);
        alert("경로를 찾는 도중 오류가 발생했습니다.");
      }
    }
  </script>
</body>
</html>
