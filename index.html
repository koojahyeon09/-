<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신호등 지도 - AI 최적 경로 탐색</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center p-4 md:p-8">

  <!-- Header -->
  <header class="w-full max-w-xl text-center mb-8">
    <div class="inline-flex items-center gap-2 mb-2">
      <span class="w-4 h-4 rounded-full bg-red-500 animate-pulse"></span>
      <span class="w-4 h-4 rounded-full bg-yellow-500 animate-pulse"></span>
      <span class="w-4 h-4 rounded-full bg-green-500 animate-pulse"></span>
    </div>
    <h1 class="text-3xl font-bold tracking-tight text-white">🚦 AI 신호등 지도</h1>
    <p class="text-slate-400 text-sm mt-1">Gemini AI가 신호 대기 시간을 고려한 최적 경로를 안내합니다.</p>
  </header>

  <!-- Input Form -->
  <main class="w-full max-w-xl bg-slate-800 rounded-2xl p-6 shadow-xl border border-slate-700">
    <form id="routeForm" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">출발지</label>
        <input 
          type="text" 
          id="startInput" 
          placeholder="예: 강남역 10번 출구" 
          required 
          class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-green-500 transition"
        />
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">목적지</label>
        <input 
          type="text" 
          id="destInput" 
          placeholder="예: 역삼역 3번 출구" 
          required 
          class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-green-500 transition"
        />
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">이동 수단</label>
        <select id="modeSelect" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-green-500 transition">
          <option value="보행자">보행자 (도보)</option>
          <option value="자전거 / 킥보드">자전거 / 킥보드</option>
          <option value="운전자 (차량)">운전자 (차량)</option>
        </select>
      </div>

      <button 
        type="submit" 
        id="submitBtn"
        class="w-full bg-green-600 hover:bg-green-500 text-white font-semibold py-3 rounded-lg shadow-lg hover:shadow-green-500/20 transition flex items-center justify-center gap-2"
      >
        <span>신호등 최적 경로 탐색</span>
      </button>
    </form>

    <!-- Loading State -->
    <div id="loading" class="hidden text-center py-8">
      <div class="inline-block w-8 h-8 border-4 border-green-500 border-t-transparent rounded-full animate-spin mb-3"></div>
      <p class="text-slate-300 text-sm">실시간 신호등 패턴 및 경로 분석 중...</p>
    </div>

    <!-- Error Message -->
    <div id="errorBox" class="hidden mt-4 p-4 bg-red-900/50 border border-red-700 rounded-lg text-red-200 text-sm"></div>

    <!-- Results Section -->
    <div id="resultBox" class="hidden mt-6 pt-6 border-t border-slate-700 space-y-4">
      <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-700">
        <span class="text-xs font-bold text-green-400 uppercase tracking-wide">경로 요약</span>
        <h2 id="resultSummary" class="text-lg font-semibold text-white mt-1"></h2>
        
        <div class="flex gap-4 mt-3 text-sm text-slate-300">
          <div class="bg-slate-800 px-3 py-1.5 rounded-md border border-slate-700">
            ⏱️ 소요시간: <strong id="resultTime" class="text-white"></strong>
          </div>
          <div class="bg-slate-800 px-3 py-1.5 rounded-md border border-slate-700">
            🚦 예상 신호등: <strong id="resultLights" class="text-white"></strong>
          </div>
        </div>
      </div>

      <!-- Step by Step -->
      <div>
        <h3 class="text-sm font-semibold text-slate-300 mb-2">상세 안내</h3>
        <ol id="resultSteps" class="space-y-2 text-sm text-slate-300 list-decimal list-inside bg-slate-900/40 p-4 rounded-xl border border-slate-800">
        </ol>
      </div>

      <!-- AI Tip -->
      <div class="p-4 bg-yellow-500/10 border border-yellow-500/30 rounded-xl text-yellow-200 text-xs leading-relaxed">
        <strong>💡 AI 신호등 팁:</strong> <span id="resultTip"></span>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById('routeForm');
    const loading = document.getElementById('loading');
    const resultBox = document.getElementById('resultBox');
    const errorBox = document.getElementById('errorBox');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const start = document.getElementById('startInput').value;
      const destination = document.getElementById('destInput').value;
      const mode = document.getElementById('modeSelect').value;

      // UI 초기화
      resultBox.classList.add('hidden');
      errorBox.classList.add('hidden');
      loading.classList.remove('hidden');
      submitBtn.disabled = true;

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ start, destination, mode })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || '경로를 가져오지 못했습니다.');
        }

        // 결과 바인딩
        document.getElementById('resultSummary').innerText = data.summary;
        document.getElementById('resultTime').innerText = data.estimatedTime;
        document.getElementById('resultLights').innerText = data.trafficLightCount;
        document.getElementById('resultTip').innerText = data.aiTip;

        const stepsOl = document.getElementById('resultSteps');
        stepsOl.innerHTML = '';
        data.steps.forEach(stepText => {
          const li = document.createElement('li');
          li.className = 'py-1 border-b border-slate-800/50 last:border-none';
          li.innerText = stepText;
          stepsOl.appendChild(li);
        });

        resultBox.classList.remove('hidden');
      } catch (err) {
        errorBox.innerText = err.message;
        errorBox.classList.remove('hidden');
      } finally {
        loading.classList.add('hidden');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
