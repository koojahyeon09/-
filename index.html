<!-- 검색바 내부 스타일 보완 -->
<style>
  .search-container { position: relative; }
  .autocomplete-list {
    position: absolute; top: 100%; left: 0; right: 0;
    background: white; border: 1px solid #ccc; border-radius: 4px;
    max-height: 150px; overflow-y: auto; z-index: 2000;
    list-style: none; margin: 4px 0 0 0; padding: 0; display: none;
  }
  .autocomplete-list li {
    padding: 8px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #eee;
  }
  .autocomplete-list li:hover { background-color: #f0f0f0; }
</style>

<!-- 자동완성 후보를 받아오는 JS 예시 -->
<script>
  async function searchPlaces(query) {
    if (!query) return [];
    // OpenStreetMap의 무료 장소 검색 API 호출
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5&countrycodes=kr`);
    return await res.json();
  }
</script>
