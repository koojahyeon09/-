<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic Light Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    #search-bar {
      position: absolute; top: 15px; left: 50px; z-index: 1000;
      background: white; padding: 12px; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2); display: flex; gap: 6px;
    }
    #map { width: 100vw; height: 100vh; }
    input, select, button { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
    
    /* 신호등 커스텀 마커 스타일 */
    .traffic-icon {
      font-size: 20px; text-align: center; line-height: 20px;
    }
  </style>
</head>
<body>

  <div id="search-bar">
    <input type="text" id="startInput" placeholder="출발지 (예: 서현역)">
    <input type="text" id="destInput" placeholder="목적지 (예: 분당대진고등학교)">
    <select id="modeSelect">
      <option value="driving">차도 경로</option>
      <option value="foot">보행자 경로</option>
    </select>
    <button onclick="findRoute()">경로 검색</button>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([37.3827, 127.1189], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let currentLayers = [];

    async function findRoute() {
      const start = document.getElementById('startInput').value;
      const destination = document.getElementById('destInput').value;
      const mode = document.getElementById('modeSelect').value;

      if (!start || !destination) return alert("출발지와 목적지를 입력하세요.");

      // 기존 레이어 제거
      currentLayers.forEach(layer => map.removeLayer(layer));
      currentLayers = [];

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ start, destination, mode })
        });

        const data = await res.json();
        if (!data.success) throw new Error(data.error);

        const { coords, routeGeometry, trafficLights } = data;

        // 1. 출발지 / 목적지 마커
        const m1 = L.marker([coords.start.lat, coords.start.lng]).addTo(map).bindPopup("출발지: " + start).openPopup();
        const m2 = L.marker([coords.dest.lat, coords.dest.lng]).addTo(map).bindPopup("목적지: " + destination);
        currentLayers.push(m1, m2);

        // 2. OSRM 도로 경로 그리기
        if (routeGeometry) {
          const routeLayer = L.geoJSON(routeGeometry, {
            style: { color: '#0066FF', weight: 5, opacity: 0.8 }
          }).addTo(map);
          currentLayers.push(routeLayer);
          map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });
        }

        // 3. 신호등 데이터 지도에 표시 🚦
        if (trafficLights && trafficLights.length > 0) {
          trafficLights.forEach(item => {
            // API 응답의 위도/경도 필드명 확인 (lat/lng 또는 y/x)
            const lat = item.lat || item.gpsY || item.latitude;
            const lng = item.lng || item.gpsX || item.longitude;

            if (lat && lng) {
              const trafficIcon = L.divIcon({
                className: 'traffic-icon',
                html: '🚦',
                iconSize: [25, 25]
              });
              const tMarker = L.marker([lat, lng], { icon: trafficIcon })
                .addTo(map)
                .bindPopup(`<b>신호등 정보</b><br>${item.trafficLightNm || '신호등 위치'}`);
              currentLayers.push(tMarker);
            }
          });
        }

      } catch (err) {
        alert(err.message || "오류가 발생했습니다.");
      }
    }
  </script>
</body>
</html>
